<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rewind.channel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff41;
      --dim: rgba(0, 0, 0, 0.6);
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      color: #fff;
    }

    /* ── Player ── */
    #player-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #player-wrap iframe {
      width: 100vw;
      height: 56.25vw; /* 16:9 */
      min-height: 100vh;
      min-width: 177.78vh;
      pointer-events: none; /* no YT controls */
    }

    /* ── Scanlines ── */
    #scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.08) 3px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* ── UI chrome ── */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
    }

    /* Top-right: channel bug */
    #channel-bug {
      position: absolute;
      top: 24px;
      right: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.85;
    }

    #bug-dot {
      width: 10px; height: 10px;
      background: #e53935;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #channel-name {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 8px rgba(255,255,255,0.4);
    }

    /* ── MTV Band ── */
    #mtv-band {
      position: absolute;
      bottom: 44px;
      left: 0;
      padding: 16px 56px 16px 28px;
      clip-path: polygon(0 0, calc(100% - 28px) 0, 100% 50%, calc(100% - 28px) 100%, 0 100%);
      transform: translateX(-110%);
      transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
      pointer-events: none;
      max-width: 500px;
    }

    #mtv-band.visible {
      transform: translateX(0);
    }

    #band-artist {
      font-size: 22px;
      font-weight: 900;
      color: #000;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 1.1;
    }

    #band-title {
      font-size: 13px;
      font-weight: 600;
      font-style: italic;
      color: #000;
      margin-top: 3px;
    }

    #band-director {
      font-size: 10px;
      color: rgba(0, 0, 0, 0.55);
      margin-top: 4px;
    }

    /* ── Intro overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.6s ease;
    }

    #overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #overlay-logo {
      font-size: clamp(28px, 5vw, 52px);
      letter-spacing: 0.08em;
      color: #fff;
      margin-bottom: 8px;
    }

    #overlay-logo span {
      color: var(--green);
    }

    #overlay-sub {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 56px;
    }

    #overlay-cta {
      font-size: 12px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 12px 28px;
      transition: all 0.2s;
    }

    #overlay:hover #overlay-cta {
      border-color: rgba(255,255,255,0.5);
      color: #fff;
    }

    #overlay-noise {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
      pointer-events: none;
    }

    /* ── Channel selector ── */
    #channel-selector {
      position: absolute;
      top: 24px;
      left: 28px;
      display: flex;
      gap: 6px;
      pointer-events: all;
    }

    .ch-btn {
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 5px 11px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      user-select: none;
    }

    .ch-btn:hover {
      color: rgba(255,255,255,0.7);
      border-color: rgba(255,255,255,0.3);
    }

    .ch-btn.active {
      color: var(--green);
      border-color: var(--green);
    }

    /* ── Unmute hint ── */
    #mute-hint {
      position: fixed;
      bottom: 32px;
      right: 28px;
      z-index: 30;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      pointer-events: all;
      text-transform: uppercase;
      transition: color 0.2s;
      user-select: none;
      display: none;
    }

    #mute-hint:hover { color: rgba(255,255,255,0.9); }
  </style>
</head>
<body>

  <!-- Intro overlay -->
  <div id="overlay">
    <div id="overlay-noise"></div>
    <div id="overlay-logo">rewind<span>.</span>channel</div>
    <div id="overlay-sub">Music Television — 24/7</div>
    <div id="overlay-cta">&#9654;&nbsp; Tune In</div>
  </div>

  <!-- TV frame -->
  <div id="player-wrap">
    <div id="yt-player"></div>
  </div>

  <div id="scanlines"></div>

  <div id="ui">
    <div id="channel-selector">
      <button class="ch-btn active" onclick="switchChannel('playlist.json', this)">00s</button>
      <button class="ch-btn" onclick="switchChannel('playlist-90s.json', this)">90s</button>
      <button class="ch-btn" onclick="switchChannel('playlist-80s.json', this)">80s</button>
    </div>

    <div id="channel-bug">
      <div id="bug-dot"></div>
      <div id="channel-name">rewind.channel</div>
    </div>

    <div id="mtv-band">
      <div id="band-artist"></div>
      <div id="band-title"></div>
      <div id="band-director"></div>
    </div>
  </div>

  <div id="mute-hint" onclick="toggleMute()">&#128264; Mute</div>

  <script>
    // ── Debug ────────────────────────────────────────────────────────────────
    const YT_STATES = { '-1': 'unstarted', 0: 'ended', 1: 'playing', 2: 'paused', 3: 'buffering', 5: 'cued' };
    const YT_ERRORS = { 2: 'paramètre invalide', 5: 'erreur lecteur HTML5', 100: 'vidéo introuvable ou privée', 101: 'embed bloqué par le propriétaire', 150: 'embed bloqué (variante 101)' };

    function dbg(event, detail = {}) {
      const t = new Date().toTimeString().slice(0, 8);
      console.log(`%c[rewind ${t}] %c${event}`, 'color:#00ff41;font-weight:bold', 'color:#ccc', detail);
    }

    // ── State ────────────────────────────────────────────────────────────────
    const RWD_COLORS = ['#FFE600', '#FF0099', '#00E5FF', '#FF4500', '#CCFF00'];
    let playlist = [];
    let player = null;
    let currentIndex = -1;
    let isMuted = false;
    let bandTimers = [];
    let watchdogTimer = null;
    let settling = false;

    // ── Sync ─────────────────────────────────────────────────────────────────
    function totalDuration() {
      return playlist.reduce((s, v) => s + v.duration, 0);
    }

    function getState() {
      const now = Math.floor(Date.now() / 1000);
      const total = totalDuration();
      let pos = now % total;

      for (let i = 0; i < playlist.length; i++) {
        if (pos < playlist[i].duration) {
          return { index: i, offset: pos };
        }
        pos -= playlist[i].duration;
      }
    }

    // ── UI helpers ────────────────────────────────────────────────────────────
    function updateNowPlaying(index) {
      const v = playlist[index];
      document.getElementById('band-artist').textContent = v.artist;
      document.getElementById('band-title').textContent = v.title;
      document.getElementById('band-director').textContent = v.director ? 'dir. ' + v.director : '';
    }

    function showBand() {
      document.getElementById('mtv-band').classList.add('visible');
    }

    function hideBand() {
      document.getElementById('mtv-band').classList.remove('visible');
    }

    function scheduleBand(offset, duration) {
      bandTimers.forEach(clearTimeout);
      bandTimers = [];

      showBand();
      bandTimers.push(setTimeout(hideBand, 8000));

      const timeUntilReappear = (duration - offset - 10) * 1000;
      if (timeUntilReappear > 9000) {
        bandTimers.push(setTimeout(showBand, timeUntilReappear));
      }
    }

    // ── Player control ────────────────────────────────────────────────────────
    function loadVideo(index, offset) {
      if (!player || typeof player.loadVideoById !== 'function') return;
      currentIndex = index;
      settling = true;
      setTimeout(() => { settling = false; }, 3000);
      const v = playlist[index];

      clearTimeout(watchdogTimer);
      watchdogTimer = setTimeout(() => {
        if (player.getPlayerState() === -1) {
          dbg(`skipped: ${v.id} - not playable`);
          loadVideo((currentIndex + 1) % playlist.length, 0);
        }
      }, 5000);

      dbg('load', { id: v.id, artist: v.artist, title: v.title, offset: `${offset}s` });
      player.loadVideoById({ videoId: v.id, startSeconds: offset });
      player.setVolume(80);
      if (isMuted) player.mute(); else player.unMute();

      document.getElementById('mtv-band').style.background = RWD_COLORS[index % RWD_COLORS.length];
      updateNowPlaying(index);
      scheduleBand(offset, v.duration);

      // Safety timeout: advance a few seconds before expected end
      const remaining = (v.duration - offset) * 1000;
      setTimeout(() => {
        const state = player.getPlayerState && player.getPlayerState();
        // -1=unstarted, 0=ended, 1=playing, 2=paused, 3=buffering, 5=cued
        if (state !== 0) {
          const next = (currentIndex + 1) % playlist.length;
          loadVideo(next, 0);
        }
      }, remaining + 2000);
    }

    function toggleMute() {
      if (!player) return;
      isMuted = !isMuted;
      const hint = document.getElementById('mute-hint');
      if (isMuted) {
        player.mute();
        hint.innerHTML = '&#128266; Unmute';
      } else {
        player.unMute();
        hint.innerHTML = '&#128264; Mute';
      }
    }

    // ── YouTube IFrame API ────────────────────────────────────────────────────
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        width: '100%',
        height: '100%',
        playerVars: {
          autoplay: 1,
          controls: 0,
          disablekb: 1,
          fs: 0,
          iv_load_policy: 3,
          modestbranding: 1,
          playsinline: 1,
          rel: 0,
          showinfo: 0
        },
        events: {
          onReady: () => {
            dbg('player ready');
            const { index, offset } = getState();
            loadVideo(index, offset);
          },
          onStateChange: (e) => {
            const stateName = YT_STATES[e.data] ?? String(e.data);
            console.log(`[rewind] state: ${e.data}=${stateName} | settling=${settling}`);
            if (e.data === YT.PlayerState.PLAYING) {
              clearTimeout(watchdogTimer);
            }
            if (e.data === YT.PlayerState.ENDED && !settling) {
              const next = (currentIndex + 1) % playlist.length;
              loadVideo(next, 0);
            }
          },
          onError: (e) => {
            dbg('error', { code: e.data, reason: YT_ERRORS[e.data] ?? 'erreur inconnue', id: playlist[currentIndex]?.id });
          }
        }
      });
    }

    // ── Overlay ───────────────────────────────────────────────────────────────
    function tuneIn() {
      const overlay = document.getElementById('overlay');
      overlay.classList.add('fade-out');
      setTimeout(() => overlay.remove(), 700);

      document.getElementById('mute-hint').style.display = 'block';

      // Inject YT script after user gesture so autoplay is allowed
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }

    document.getElementById('overlay').addEventListener('click', tuneIn);

    // ── Channel switching ─────────────────────────────────────────────────────
    function switchChannel(file, btn) {
      document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      fetch(file)
        .then(r => r.json())
        .then(data => {
          playlist = data;
          if (player && typeof player.loadVideoById === 'function') {
            const { index, offset } = getState();
            loadVideo(index, offset);
          }
        });
    }

    // ── Load playlist ─────────────────────────────────────────────────────────
    fetch('playlist.json')
      .then(r => r.json())
      .then(data => { playlist = data; })
      .catch(() => {
        playlist = [
          { id: "YVkUvmDQ3HY", artist: "Eminem", title: "Without Me", year: 2002, duration: 290 },
          { id: "eVTXPUF4Oz4", artist: "Linkin Park", title: "In The End", year: 2001, duration: 216 }
        ];
      });
  </script>

</body>
</html>
